<div id="chat"></div>

<script>

    "오늘은 종이를 먹지 않았습니다.",
    "복사기와 합의 중입니다.",
  ]
},
{
  name: "소문전문가",
  emoji: "🤡",
  phrases: [
    "펭귄이 승진했다는 소문이 있습니다.",
    "7층에서 이상한 일이 있었다고 합니다.",
    "확실하지는 않습니다.",
    "확실하지는 않습니다만...",
    "들은 이야기인데요...",
    "아무에게도 말하지 마세요.",
    "CEO가 사실 세 마리의 너구리라는 소문이 있습니다.",
  ]
},

{
  name: "펭귄",
  emoji: "🐧",
  phrases: [
    "꽥.",
    "회의실이 춥지 않습니다.",
    "오늘도 최선을 다해 미끄러졌습니다.",

  ]

{

  emoji: "🤖",
  phrases: [

  ]

{
  name: "탕비실 수호자",
  emoji: "☕",
  phrases: [
    "커피가 부족합니다.",
    "커피가 매우 부족합니다.",
    "상황이 심각합니다.",
    "커피가 완전히 부족합니다."
  ]
},

{
  name: "클립보드 관리자",
  emoji: "📎",
  phrases: [

    "이 회사는 클립을 너무 많이 씁니다."
  ]
},

{
  name: "엑셀무당",
  emoji: "📊",
  phrases: [
    "피벗 테이블이 그렇게 말했습니다.",
    "엑셀의 계시를 받았습니다.",
    "그래프가 불길합니다.",
    "VLOOKUP이 저를 버렸습니다."
  ]
},

{
  name: "퇴사예정자",
  emoji: "🚪",
  phrases: [
    "오늘은 아닙니다.",
    "내일일 수도 있습니다.",
    "사직서를 열 번쯤 썼습니다.",
    "마음속으로는 이미 퇴사했습니다."
  ]
},

{
  name: "야근요정",
  emoji: "🦝",
  phrases: [
    "집이 기억나지 않습니다.",
    "벌써 밤인가요?"
  ]
}
];

let coffee = 80;
let happiness = 50;
let penguin = 10;
let ghost = 90;
  
const chat = document.getElementById("chat");

function addMessage(name, text) {

  const div = document.createElement("div");

  div.className = "message";

  div.innerHTML = `
    <b>${name}</b><br>
    ${text}
  `;

  chat.prepend(div);
}

function randomChat() {

  const employee =
    employees[
      Math.floor(Math.random() * employees.length)
    ];

  const phrase =
    employee.phrases[
      Math.floor(
        Math.random() * employee.phrases.length
      )
    ];

addMessage(
  employee.emoji + " " + employee.name,
  phrase
);
}

let running = true;

let chatInterval = setInterval(randomChat, 3000);

function toggleChat() {

  if (running) {
    clearInterval(chatInterval);
    running = false;
  } else {
    chatInterval = setInterval(randomChat, 3000);
    running = true;
  }

}

function updateDashboard() {

  coffee += Math.floor(Math.random() * 11) - 5;

  if(coffee < 0) coffee = 0;
  if(coffee > 100) coffee = 100;

  happiness += Math.floor(Math.random() * 7) - 3;

  if(coffee < 20) {
    happiness -= 5;
  }

  if(happiness < 0) happiness = 0;
  if(happiness > 100) happiness = 100;

  penguin += Math.floor(Math.random() * 5);

  if(penguin > 100) {
    penguin = 100;
  }

  ghost += Math.floor(Math.random() * 11) - 5;

  if(ghost < 0) ghost = 0;
  if(ghost > 100) ghost = 100;

  document.getElementById("coffee").textContent = coffee;
  document.getElementById("happiness").textContent = happiness;
  document.getElementById("penguin").textContent = penguin;
  document.getElementById("ghost").textContent = ghost;

}
  
</script>

</body>
